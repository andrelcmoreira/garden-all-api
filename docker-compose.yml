networks:
  network:
    driver: bridge

volumes:
  postgres-data:
    driver: local

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: garden-all-api
    image: garden-all-api:${VERSION}
    networks:
      - network
    ports:
      - '80:8000'
    depends_on:
      - db
    environment:
      - VERSION=${VERSION}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=${ENVIRONMENT}
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_ENGINE=${DB_ENGINE}

  db:
    build: db
    container_name: garden-all-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - '5432:5432'
    networks:
      - network
    volumes:
      - postgres-data:/var/lib/postgresql
